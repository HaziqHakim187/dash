<!doctype html>
<html lang="ms" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Scorecard Dashboard</title>
  <link rel="stylesheet" href="css/index.css">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
 </head>
 <body class="h-full w-full overflow-auto" style="margin:0; padding:0;">
    <div class="main-container">
        <div id="app-wrapper" class="h-full w-full" style="background: #0b1120; padding-bottom: 60px;"><!-- Logo Container - Centered -->
   <div style="display:flex;justify-content:center;align-items:center;padding:24px 0;border-bottom:1px solid rgba(255,255,255,0.06);"><img src="img/logo.png" alt="Lunas Sdn.Bhd" style="height: 200px; width: auto;">
   </div>
  <div id="app-wrapper" class="h-full w-full" style="background: #0b1120;"><!-- Ambient BG -->
   <div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;">
    <div style="position:absolute;top:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,0.08),transparent 70%);border-radius:50%;"></div>
    <div style="position:absolute;bottom:-15%;right:-5%;width:600px;height:600px;background:radial-gradient(circle,rgba(16,185,129,0.06),transparent 70%);border-radius:50%;"></div>
    <div style="position:absolute;top:30%;right:20%;width:300px;height:300px;background:radial-gradient(circle,rgba(168,85,247,0.05),transparent 70%);border-radius:50%;"></div>
   </div>
   <div style="position:relative;z-index:1;padding:28px 36px;max-width:1920px;margin:0 auto;"><!-- Header -->
    <header class="flex items-center justify-between mb-7">
     <div>
      <h1 id="dashboard-title" class="text-2xl font-800 tracking-tight" style="color:#f1f5f9;">Staff Overview Dashboard</h1>
      <p class="text-sm mt-1" style="color:#64748b;">Real-time workforce monitoring</p>
     </div>
     <div class="flex items-center gap-3">
      <div class="flex items-center gap-2 px-4 py-2 rounded-xl" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);"><i data-lucide="calendar" style="width:15px;height:15px;color:#64748b;"></i> <span id="current-date" class="text-xs font-500" style="color:#94a3b8;"></span>
      </div>
      <div class="flex items-center gap-2 px-4 py-2 rounded-xl" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);"><span class="block w-2 h-2 rounded-full" style="background:#10b981;box-shadow:0 0 8px rgba(16,185,129,0.5);"></span> <span class="text-xs font-500" style="color:#94a3b8;">Live</span>
      </div>
     </div>
    </header><!-- Scorecard Grid -->
    <div id="card-grid" class="grid gap-5" style="grid-template-columns: repeat(3, 1fr);">
    </div>
   </div>
  </div>

  <footer style="position:fixed;bottom:0;left:0;right:0;padding:12px 36px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(11,17,32,0.95);backdrop-filter:blur(12px);text-align:center;font-size:11px;color:#64748b;z-index:10;">
   <p style="margin:0;">Copyright © MyLUNAS DEX System 2026. Developed by LUNAS-ISD.</p>
  </footer>

  <script src="js/index.js"></script>

</body>
</html>
